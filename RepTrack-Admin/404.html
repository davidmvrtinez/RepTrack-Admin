<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RepTrack Admin</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
  input,select,textarea{font-family:inherit;font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-weight:600;font-size:14px;border:none;transition:opacity .15s}
  .btn:hover{opacity:.88}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn-primary{background:#2563eb;color:#fff}
  .btn-danger{background:#dc2626;color:#fff}
  .btn-secondary{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0}
  .btn-sm{padding:6px 12px;font-size:13px}
  .card{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:24px}
  .badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700}
  .badge-blue{background:#dbeafe;color:#1d4ed8}
  .badge-green{background:#dcfce7;color:#166534}
  .badge-amber{background:#fef3c7;color:#92400e}
  .badge-red{background:#fee2e2;color:#991b1b}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.6px;text-transform:uppercase;padding:10px 14px;border-bottom:1.5px solid #e2e8f0}
  td{padding:12px 14px;border-bottom:1px solid #f1f5f9;font-size:14px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafafa}
  .input{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;color:#1e293b;background:#fff;outline:none}
  .input:focus{border-color:#2563eb}
  .label{font-size:12px;font-weight:700;color:#64748b;margin-bottom:5px;display:block}
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:#fff;border-radius:16px;padding:32px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal-lg{max-width:680px}
  .sidebar{width:220px;background:#fff;border-right:1.5px solid #e2e8f0;min-height:100vh;position:fixed;top:0;left:0;display:flex;flex-direction:column}
  .main{margin-left:220px;min-height:100vh;display:flex;flex-direction:column}
  .topbar{background:#fff;border-bottom:1.5px solid #e2e8f0;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .content{padding:32px;max-width:1100px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:14px;font-weight:600;color:#64748b;cursor:pointer;border-radius:0;transition:all .15s;text-decoration:none;border-left:3px solid transparent}
  .nav-item:hover{background:#f8fafc;color:#1e293b}
  .nav-item.active{background:#eff6ff;color:#2563eb;border-left-color:#2563eb}
  .stat-card{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
  .stat-val{font-size:32px;font-weight:800;color:#1e293b;line-height:1}
  .stat-label{font-size:13px;color:#64748b;margin-top:4px}
  .color-swatch{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
  .tab{padding:8px 18px;font-size:14px;font-weight:600;border:none;background:none;cursor:pointer;color:#64748b;border-bottom:2.5px solid transparent}
  .tab.active{color:#2563eb;border-bottom-color:#2563eb}
  .section-title{font-size:18px;font-weight:800;color:#1e293b;margin-bottom:4px}
  .section-sub{font-size:14px;color:#64748b;margin-bottom:20px}
  .empty{text-align:center;padding:48px;color:#94a3b8}
  .empty-icon{font-size:40px;margin-bottom:12px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Config ───────────────────────────────────────────────────
const SUPABASE_URL  = 'https://btyvisolishmnhkaruex.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0eXZpc29saXNobW5oa2FydWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDc5NzAsImV4cCI6MjA5MzkyMzk3MH0.DYLmP7jzEkA_KYDU_cb77ERl4TfImC6TFGApPHhMoaQ';
const EDGE_BASE     = `${SUPABASE_URL}/functions/v1`;
const supabase      = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Helpers ──────────────────────────────────────────────────
function roleBadge(role) {
  const map = { owner:'badge-blue', admin:'badge-green', member:'badge-amber' };
  return <span className={`badge ${map[role]||'badge-amber'}`}>{role}</span>;
}
function ColorSwatch({ color, name }) {
  const initial = (name||'?')[0].toUpperCase();
  return <div className="color-swatch" style={{background:color||'#6366f1'}}>{initial}</div>;
}
function Modal({ title, onClose, children, large }) {
  return (
    <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className={`modal${large?' modal-lg':''}`}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontWeight:800,fontSize:18,color:'#1e293b'}}>{title}</div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,color:'#94a3b8',cursor:'pointer',lineHeight:1}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}
function Field({ label, children }) {
  return (
    <div style={{marginBottom:16}}>
      <label className="label">{label}</label>
      {children}
    </div>
  );
}
function Spinner() {
  return <div style={{display:'inline-block',width:16,height:16,border:'2px solid rgba(255,255,255,.4)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .6s linear infinite'}}></div>;
}

// ── Join Page (public, no auth required) ─────────────────────
function JoinPage() {
  const [code] = useState(()=>new URLSearchParams(window.location.search).get('code')||'');
  const [info, setInfo] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');

  useEffect(()=>{
    if(!code){setError('No invite code in URL.');setLoading(false);return;}
    supabase.rpc('lookup_invite_code',{p_code:code}).then(({data,error:e})=>{
      if(e||!data||data.length===0){setError('Invite code not found or already used.');setLoading(false);return;}
      setInfo(data[0]);setLoading(false);
    });
  },[code]);

  return (
    <div style={{minHeight:'100vh',background:'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:16,overflow:'hidden',boxShadow:'0 8px 40px rgba(0,0,0,.12)',width:'100%',maxWidth:480}}>
        <div style={{background:'linear-gradient(135deg,#1d4ed8,#2563eb)',padding:'32px',textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:8}}>📦</div>
          <div style={{color:'#fff',fontWeight:800,fontSize:24}}>RepTrack</div>
          <div style={{color:'rgba(255,255,255,.7)',fontSize:14,marginTop:4}}>Team Invitation</div>
        </div>
        <div style={{padding:36}}>
          {loading && <div style={{textAlign:'center',color:'#64748b'}}>Looking up invite…</div>}
          {error && <div style={{color:'#dc2626',textAlign:'center'}}>{error}</div>}
          {info && (<>
            <div style={{fontWeight:700,fontSize:20,color:'#1e293b',marginBottom:8}}>
              You're invited to join <span style={{color:'#2563eb'}}>{info.org_name}</span>
            </div>
            <div style={{color:'#64748b',fontSize:14,marginBottom:24}}>
              Team: <strong>{info.team_name}</strong> · Role: <strong style={{textTransform:'capitalize'}}>{info.role}</strong>
            </div>
            <div style={{background:'#f1f5f9',borderRadius:12,padding:20,textAlign:'center',marginBottom:24}}>
              <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>Invite Code</div>
              <div style={{fontSize:36,fontWeight:800,letterSpacing:6,color:'#1e293b',fontFamily:'monospace'}}>{code}</div>
            </div>
            <div style={{color:'#475569',fontSize:14,lineHeight:2}}>
              <div>1. Download the <strong>RepTrack</strong> app on your iPhone</div>
              <div>2. Create an account with your email address</div>
              <div>3. Enter the code above on the welcome screen</div>
            </div>
          </>)}
        </div>
      </div>
    </div>
  );
}

// ── Login Screen ─────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  async function handleSubmit(e) {
    e.preventDefault();
    setLoading(true); setError('');
    const { error: err } = await supabase.auth.signInWithPassword({ email, password });
    if (err) { setError(err.message); setLoading(false); }
    else onLogin();
  }

  return (
    <div style={{minHeight:'100vh',background:'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:16,padding:40,width:'100%',maxWidth:400,boxShadow:'0 8px 40px rgba(0,0,0,.1)'}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:40,marginBottom:8}}>📦</div>
          <div style={{fontWeight:800,fontSize:24,color:'#1e293b'}}>RepTrack Admin</div>
          <div style={{color:'#64748b',fontSize:14,marginTop:4}}>Sign in to manage your platform</div>
        </div>
        <form onSubmit={handleSubmit}>
          <Field label="Email">
            <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} required autoFocus/>
          </Field>
          <Field label="Password">
            <input className="input" type="password" value={password} onChange={e=>setPassword(e.target.value)} required/>
          </Field>
          {error && <div style={{color:'#dc2626',fontSize:13,marginBottom:12,padding:'8px 12px',background:'#fef2f2',borderRadius:8}}>{error}</div>}
          <button className="btn btn-primary" type="submit" disabled={loading} style={{width:'100%',justifyContent:'center',padding:'12px'}}>
            {loading ? <Spinner/> : 'Sign In'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── No Access Screen ─────────────────────────────────────────
function NoAccessScreen({ email, onSignOut }) {
  return (
    <div style={{minHeight:'100vh',background:'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center',padding:40}}>
        <div style={{fontSize:48,marginBottom:16}}>🚫</div>
        <div style={{fontWeight:800,fontSize:20,color:'#1e293b',marginBottom:8}}>No Admin Access</div>
        <div style={{color:'#64748b',marginBottom:24}}>{email} does not have admin permissions.</div>
        <button className="btn btn-secondary" onClick={onSignOut}>Sign Out</button>
      </div>
    </div>
  );
}

// ── Invite Modal ─────────────────────────────────────────────
function InviteModal({ org, teams, onClose, session }) {
  const [teamId, setTeamId] = useState(teams[0]?.id||'');
  const [role, setRole] = useState('member');
  const [email, setEmail] = useState('');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [emailSent, setEmailSent] = useState(false);
  const [emailLoading, setEmailLoading] = useState(false);
  const [copied, setCopied] = useState(false);

  const joinUrl = result ? `${window.location.origin}/join?code=${result.invite_code}` : '';

  async function handleCreate() {
    setLoading(true);
    const { data, error } = await supabase.rpc('admin_create_invite', {
      p_org_id: org.id, p_team_id: teamId, p_role: role,
      p_email: email || null
    });
    setLoading(false);
    if (error) { alert(error.message); return; }
    setResult(data[0]);
  }

  async function sendEmail() {
    if (!email || !result) return;
    setEmailLoading(true);
    try {
      const teamName = teams.find(t=>t.id===teamId)?.name||'';
      const resp = await fetch(`${EDGE_BASE}/send-invite-email`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`
        },
        body: JSON.stringify({
          inviteCode: result.invite_code,
          email, orgName: org.name, teamName,
          joinUrl
        })
      });
      if (!resp.ok) throw new Error(await resp.text());
      setEmailSent(true);
    } catch(e) { alert('Email failed: ' + e.message); }
    setEmailLoading(false);
  }

  function copyLink() {
    navigator.clipboard.writeText(joinUrl);
    setCopied(true); setTimeout(()=>setCopied(false), 2000);
  }

  return (
    <Modal title="Invite Member" onClose={onClose}>
      {!result ? (<>
        <Field label="Team">
          <select className="input" value={teamId} onChange={e=>setTeamId(e.target.value)}>
            {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
        </Field>
        <Field label="Role">
          <select className="input" value={role} onChange={e=>setRole(e.target.value)}>
            <option value="member">Member</option>
            <option value="admin">Admin</option>
            <option value="owner">Owner</option>
          </select>
        </Field>
        <Field label="Email (optional — for sending invite email)">
          <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="rep@example.com"/>
        </Field>
        <div style={{display:'flex',gap:10,marginTop:8}}>
          <button className="btn btn-secondary" onClick={onClose} style={{flex:1}}>Cancel</button>
          <button className="btn btn-primary" onClick={handleCreate} disabled={loading||!teamId} style={{flex:2}}>
            {loading ? <Spinner/> : 'Generate Invite'}
          </button>
        </div>
      </>) : (<>
        <div style={{background:'#f0fdf4',border:'1.5px solid #bbf7d0',borderRadius:12,padding:20,textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:'#166534',letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>Invite Code</div>
          <div style={{fontSize:40,fontWeight:800,letterSpacing:6,color:'#1e293b',fontFamily:'monospace',marginBottom:4}}>{result.invite_code}</div>
          <div style={{fontSize:12,color:'#64748b'}}>Expires {new Date(result.expires_at).toLocaleDateString()}</div>
        </div>
        <div style={{marginBottom:16}}>
          <label className="label">Shareable Link</label>
          <div style={{display:'flex',gap:8}}>
            <input className="input" readOnly value={joinUrl} style={{fontFamily:'monospace',fontSize:12}}/>
            <button className="btn btn-secondary btn-sm" onClick={copyLink} style={{flexShrink:0,whiteSpace:'nowrap'}}>
              {copied ? '✓ Copied' : 'Copy'}
            </button>
          </div>
        </div>
        {email && (
          <button className="btn btn-primary" onClick={sendEmail} disabled={emailLoading||emailSent} style={{width:'100%',justifyContent:'center',marginBottom:12}}>
            {emailLoading ? <Spinner/> : emailSent ? '✓ Email Sent' : `Send Email to ${email}`}
          </button>
        )}
        <button className="btn btn-secondary" onClick={onClose} style={{width:'100%',justifyContent:'center'}}>Done</button>
      </>)}
    </Modal>
  );
}

// ── Org Detail View ──────────────────────────────────────────
function OrgDetail({ org: initialOrg, isSuperAdmin, onBack, session, onOrgUpdated }) {
  const [org, setOrg] = useState(initialOrg);
  const [tab, setTab] = useState('members');
  const [members, setMembers] = useState([]);
  const [teams, setTeams] = useState([]);
  const [stats, setStats] = useState(null);
  const [invites, setInvites] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showInvite, setShowInvite] = useState(false);
  const [saving, setSaving] = useState(false);
  const [editName, setEditName] = useState(org.name);
  const [editColor, setEditColor] = useState(org.primary_color||'#6366f1');
  const [newTeamName, setNewTeamName] = useState('');
  const [addingTeam, setAddingTeam] = useState(false);

  async function loadAll() {
    setLoading(true);
    const [{ data: m }, { data: t }, { data: s }, { data: iv }] = await Promise.all([
      supabase.rpc('admin_get_org_members', { p_org_id: org.id }),
      supabase.rpc('admin_list_teams', { p_org_id: org.id }),
      supabase.rpc('admin_org_stats', { p_org_id: org.id }),
      supabase.rpc('admin_list_invites', { p_org_id: org.id }),
    ]);
    setMembers(m||[]); setTeams(t||[]); setStats(s); setInvites(iv||[]);
    setLoading(false);
  }

  useEffect(()=>{ loadAll(); },[org.id]);

  async function saveOrgSettings() {
    setSaving(true);
    const { error } = await supabase.rpc('admin_update_org', {
      p_org_id: org.id, p_name: editName, p_primary_color: editColor,
      p_logo_url: null, p_config: null
    });
    setSaving(false);
    if (error) { alert(error.message); return; }
    const updated = {...org, name:editName, primary_color:editColor};
    setOrg(updated); if(onOrgUpdated) onOrgUpdated(updated);
  }

  async function deleteOrg() {
    if (!window.confirm(`Delete "${org.name}"? This cannot be undone and will remove all teams and members.`)) return;
    const { error } = await supabase.rpc('admin_delete_org', { p_org_id: org.id });
    if (error) { alert(error.message); return; }
    onBack();
  }

  async function createTeam() {
    if (!newTeamName.trim()) return;
    setAddingTeam(true);
    const { error } = await supabase.rpc('admin_create_team', { p_org_id: org.id, p_name: newTeamName.trim() });
    setAddingTeam(false);
    if (error) { alert(error.message); return; }
    setNewTeamName(''); loadAll();
  }

  async function renameTeam(teamId, currentName) {
    const name = window.prompt('New team name:', currentName);
    if (!name || name === currentName) return;
    const { error } = await supabase.rpc('admin_rename_team', { p_team_id: teamId, p_name: name });
    if (error) alert(error.message); else loadAll();
  }

  async function deleteTeam(teamId, name) {
    if (!window.confirm(`Delete team "${name}"? Members will be unassigned.`)) return;
    const { error } = await supabase.rpc('admin_delete_team', { p_team_id: teamId });
    if (error) alert(error.message); else loadAll();
  }

  async function setRole(memberId, role) {
    const { error } = await supabase.rpc('admin_set_member_role', { p_member_id: memberId, p_role: role });
    if (error) alert(error.message); else loadAll();
  }

  async function moveMember(memberId, teamId) {
    const { error } = await supabase.rpc('admin_move_member', { p_member_id: memberId, p_team_id: teamId });
    if (error) alert(error.message); else loadAll();
  }

  async function removeMember(memberId, email) {
    if (!window.confirm(`Remove ${email} from this org?`)) return;
    const { error } = await supabase.rpc('admin_remove_member', { p_member_id: memberId });
    if (error) alert(error.message); else loadAll();
  }

  async function revokeInvite(inviteId, code) {
    if (!window.confirm(`Revoke invite code ${code}?`)) return;
    const { error } = await supabase.rpc('admin_revoke_invite', { p_invite_id: inviteId });
    if (error) alert(error.message); else loadAll();
  }

  return (
    <div className="content">
      <button onClick={onBack} style={{background:'none',border:'none',color:'#2563eb',fontWeight:600,fontSize:14,cursor:'pointer',marginBottom:20,display:'flex',alignItems:'center',gap:4}}>
        ← All Organizations
      </button>
      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:28}}>
        <ColorSwatch color={org.primary_color} name={org.name}/>
        <div>
          <div style={{fontWeight:800,fontSize:24,color:'#1e293b'}}>{org.name}</div>
          <div style={{color:'#64748b',fontSize:14,marginTop:2}}>{teams.length} team{teams.length!==1?'s':''} · {members.length} member{members.length!==1?'s':''}</div>
        </div>
      </div>

      {/* Stats row */}
      {stats && (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:12,marginBottom:28}}>
          {[
            ['👥','Members',stats.members],
            ['🏢','Teams',stats.teams],
            ['📦','Items',stats.inventory_items],
            ['🗂️','Trays',stats.trays],
            ['🏥','Cases',stats.cases],
            ['📷','Photos',stats.photos],
          ].map(([icon,label,val])=>(
            <div key={label} className="stat-card">
              <div style={{fontSize:22,marginBottom:4}}>{icon}</div>
              <div className="stat-val">{Number(val).toLocaleString()}</div>
              <div className="stat-label">{label}</div>
            </div>
          ))}
        </div>
      )}

      {/* Tabs */}
      <div style={{borderBottom:'1.5px solid #e2e8f0',marginBottom:24}}>
        {['members','teams','invites','settings'].map(t=>(
          <button key={t} className={`tab${tab===t?' active':''}`} onClick={()=>setTab(t)}
            style={{textTransform:'capitalize'}}>{t}</button>
        ))}
      </div>

      {loading && <div style={{color:'#94a3b8',padding:24}}>Loading…</div>}

      {/* Members tab */}
      {!loading && tab==='members' && (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div className="section-title">Members ({members.length})</div>
            <button className="btn btn-primary btn-sm" onClick={()=>setShowInvite(true)}>+ Invite Member</button>
          </div>
          {members.length===0 ? (
            <div className="empty"><div className="empty-icon">👥</div>No members yet. Invite someone to get started.</div>
          ) : (
            <div className="card" style={{padding:0,overflow:'hidden'}}>

function OrgsView({ isSuperAdmin, onSelectOrg, session }) {
  const [orgs, setOrgs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);
  const [newName, setNewName] = useState('');
  const [newColor, setNewColor] = useState('#6366f1');
  const [newOwnerEmail, setNewOwnerEmail] = useState('');
  const [creating, setCreating] = useState(false);

  const [loadError, setLoadError] = useState('');
  async function loadOrgs() {
    setLoading(true);
    setLoadError('');
    try {
      const result = await Promise.race([
        supabase.rpc('admin_list_orgs'),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timed out after 10s')), 10000)),
      ]);
      if (result.error) { setLoadError(result.error.message); setOrgs([]); }
      else setOrgs(result.data || []);
    } catch (e) {
      setLoadError(e.message || String(e));
      setOrgs([]);
    } finally {
      setLoading(false);
    }
  }
  useEffect(()=>{ loadOrgs(); },[]);

  async function createOrg() {
    if (!newName.trim()) return;
    setCreating(true);
    const { error } = await supabase.rpc('admin_create_org', {
      p_name: newName.trim(),
      p_owner_email: newOwnerEmail||null,
      p_primary_color: newColor
    });
    setCreating(false);
    if (error) { alert(error.message); return; }
    setShowCreate(false); setNewName(''); setNewColor('#6366f1'); setNewOwnerEmail('');
    loadOrgs();
  }

  return (
    <div className="content">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:28}}>
        <div>
          <div className="section-title">Organizations</div>

      {loading ? (
        <div style={{color:'#94a3b8',padding:24}}>Loading organizations…</div>
      ) : loadError ? (
        <div className="card" style={{background:'#fef2f2',border:'1px solid #fecaca'}}>
          <div style={{color:'#991b1b',fontWeight:700,marginBottom:6}}>Failed to load organizations</div>
          <div style={{color:'#7f1d1d',fontSize:13,marginBottom:12,fontFamily:'monospace'}}>{loadError}</div>
          <button className="btn btn-secondary btn-sm" onClick={loadOrgs}>Retry</button>
        </div>
      ) : orgs.length===0 ? (
        <div className="empty card"><div className="empty-icon">🏢</div>No organizations yet.</div>
      ) : (
        <div style={{display:'grid',gap:12}}>
          {orgs.map(org=>(

              <ColorSwatch color={org.primary_color} name={org.name}/>

                <div style={{color:'#64748b',fontSize:13,marginTop:2}}>
                  {org.team_count} team{org.team_count!==1?'s':''} · {org.member_count} member{org.member_count!==1?'s':''}
                </div>
              </div>
              <div style={{color:'#94a3b8',fontSize:12}}>{new Date(org.created_at).toLocaleDateString()}</div>

// ── Platform Stats View (super admin only) ───────────────────
function PlatformStats() {
  const [orgs, setOrgs] = useState([]);
  const [statsMap, setStatsMap] = useState({});
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    (async()=>{
      const { data } = await supabase.rpc('admin_list_orgs');
      const orgList = data||[];
      setOrgs(orgList);
      const results = await Promise.all(
        orgList.map(o=>supabase.rpc('admin_org_stats',{p_org_id:o.id}).then(({data})=>({id:o.id,stats:data})))
      );
      const map = {};
      results.forEach(r=>{ map[r.id]=r.stats; });
      setStatsMap(map); setLoading(false);
    })();
  },[]);

  const totals = orgs.reduce((acc,o)=>{
    const s = statsMap[o.id]||{};
    acc.members += Number(s.members||0);
    acc.teams   += Number(s.teams||0);
    acc.items   += Number(s.inventory_items||0);
    acc.trays   += Number(s.trays||0);
    acc.cases   += Number(s.cases||0);
    acc.photos  += Number(s.photos||0);
    return acc;
  }, {members:0,teams:0,items:0,trays:0,cases:0,photos:0});

  return (
    <div className="content">
      <div className="section-title" style={{marginBottom:4}}>Platform Stats</div>
      <div className="section-sub">Totals across all {orgs.length} organizations</div>

      {loading ? <div style={{color:'#94a3b8'}}>Loading stats…</div> : (<>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12,marginBottom:32}}>
          {[['🏢','Orgs',orgs.length],['👥','Members',totals.members],['🏴','Teams',totals.teams],
            ['📦','Items',totals.items],['🗂️','Trays',totals.trays],['🏥','Cases',totals.cases],['📷','Photos',totals.photos]
          ].map(([icon,label,val])=>(
            <div key={label} className="stat-card">
              <div style={{fontSize:24,marginBottom:4}}>{icon}</div>
              <div className="stat-val">{Number(val).toLocaleString()}</div>
              <div className="stat-label">{label}</div>
            </div>
          ))}
        </div>

        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <table>
            <thead><tr>
              <th>Organization</th><th>Members</th><th>Teams</th>
              <th>Items</th><th>Trays</th><th>Cases</th><th>Photos</th>
            </tr></thead>
            <tbody>
              {orgs.map(o=>{
                const s=statsMap[o.id]||{};
                return (
                  <tr key={o.id}>
                    <td style={{display:'flex',alignItems:'center',gap:10,fontWeight:600}}>
                      <ColorSwatch color={o.primary_color} name={o.name}/>
                      {o.name}
                    </td>
                    <td>{Number(s.members||0).toLocaleString()}</td>
                    <td>{Number(s.teams||0).toLocaleString()}</td>
                    <td>{Number(s.inventory_items||0).toLocaleString()}</td>
                    <td>{Number(s.trays||0).toLocaleString()}</td>
                    <td>{Number(s.cases||0).toLocaleString()}</td>
                    <td>{Number(s.photos||0).toLocaleString()}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </>)}
    </div>
  );
}

// ── Access Checker (diagnostic) ──────────────────────────────
function AccessChecker({ session, onAccess, onSignOut }) {
  const [log, setLog] = useState([]);
  const [running, setRunning] = useState(false);
  const append = (msg) => setLog(l => [...l, { t: new Date().toLocaleTimeString(), msg }]);

  async function checkAccess() {
    setRunning(true);
    setLog([]);
    append('User: ' + session.user.email);
    append('User ID: ' + session.user.id);
    append('Token expires: ' + new Date(session.expires_at * 1000).toLocaleString());

    // 0) Network ping to Supabase
    append('→ Network ping to Supabase…');
    try {
      const ctrl = new AbortController();
      setTimeout(()=>ctrl.abort(), 4000);
      const r = await fetch(`${SUPABASE_URL}/rest/v1/`, { method: 'GET', headers: { 'apikey': SUPABASE_KEY }, signal: ctrl.signal });
      append('✓ ping HTTP ' + r.status + ' — network OK');
    } catch (e) {
      append('❌ ping failed: ' + (e.message || e) + ' — browser is blocking Supabase domain (extension? firewall?)');
    }

    // 1) is_super_admin with 5s timeout
    append('→ Calling is_super_admin()…');
    try {
      const result = await Promise.race([
        supabase.rpc('is_super_admin'),
        new Promise((_, rej) => setTimeout(() => rej(new Error('TIMEOUT after 5s')), 5000)),
      ]);
      if (result.error) {
        append('❌ is_super_admin error: ' + JSON.stringify(result.error));
      } else {
        append('✓ is_super_admin returned: ' + JSON.stringify(result.data));
        if (result.data === true) {
          append('🎉 Super admin detected — entering dashboard');
          onAccess('super');
          return;
        }
      }
    } catch (e) {
      append('❌ is_super_admin threw: ' + (e.message || e));
    }

    // 2) get_my_admin_org_ids
    append('→ Calling get_my_admin_org_ids()…');
    try {
      const result = await Promise.race([
        supabase.rpc('get_my_admin_org_ids'),
        new Promise((_, rej) => setTimeout(() => rej(new Error('TIMEOUT after 5s')), 5000)),
      ]);
      if (result.error) {
        append('❌ get_my_admin_org_ids error: ' + JSON.stringify(result.error));
      } else {
        append('✓ get_my_admin_org_ids returned: ' + JSON.stringify(result.data));
        if (result.data && result.data.length > 0) {
          append('🎉 Org admin — entering dashboard');
          onAccess('org-admin');
          return;
        }
      }
    } catch (e) {
      append('❌ get_my_admin_org_ids threw: ' + (e.message || e));
    }

    // 3) Raw fetch bypass — if this works but supabase.rpc doesn't, the JS client is broken
    append('→ Trying RAW fetch (bypassing supabase-js)…');
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(()=>ctrl.abort(), 5000);
      const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/is_super_admin`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${session.access_token}`,
          'Content-Type': 'application/json',
        },
        body: '{}',
        signal: ctrl.signal,
      });
      clearTimeout(tid);
      append('✓ raw fetch HTTP ' + r.status);
      const text = await r.text();
      append('✓ raw response: ' + text);
      if (r.ok && text.trim() === 'true') {
        append('🎉 Super admin via raw fetch — entering dashboard');
        onAccess('super');
        return;
      }
    } catch (e) {
      append('❌ raw fetch failed: ' + (e.message || e));
    }

    append('— No admin access detected.');
    setRunning(false);
  }

  useEffect(() => { checkAccess(); }, []);

  return (
    <div style={{minHeight:'100vh',background:'#f1f5f9',padding:32}}>
      <div style={{maxWidth:680,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div>
            <div style={{fontSize:22,fontWeight:800,color:'#1e293b'}}>📦 Checking access…</div>
            <div style={{fontSize:13,color:'#64748b',marginTop:2}}>{session.user.email}</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-secondary btn-sm" onClick={checkAccess} disabled={running}>{running?'Running…':'Retry'}</button>
            <button className="btn btn-secondary btn-sm" onClick={onSignOut}>Sign Out</button>
          </div>
        </div>
        <div className="card" style={{padding:16,background:'#0f172a',color:'#e2e8f0',fontFamily:'monospace',fontSize:12,lineHeight:1.6,minHeight:200}}>
          {log.length === 0 && <div style={{color:'#64748b'}}>Starting diagnostics…</div>}
          {log.map((entry,i)=>(
            <div key={i} style={{display:'flex',gap:10}}>
              <span style={{color:'#64748b',flexShrink:0}}>{entry.t}</span>
              <span style={{color: entry.msg.startsWith('❌')?'#f87171': entry.msg.startsWith('✓')?'#4ade80': entry.msg.startsWith('🎉')?'#fbbf24':'#e2e8f0'}}>{entry.msg}</span>
            </div>
          ))}
        </div>
        <div style={{marginTop:16,padding:12,background:'#fef9c3',borderRadius:8,fontSize:13,color:'#854d0e'}}>
          💡 If RPCs time out, your session token may be stale. Click <b>Sign Out</b>, then sign back in.
        </div>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null);
  const [accessLevel, setAccessLevel] = useState(null); // 'super' | 'org-admin' | 'none'
  const [view, setView] = useState('orgs'); // 'orgs' | 'stats'
  const [selectedOrg, setSelectedOrg] = useState(null);
  const [initialized, setInitialized] = useState(false);
  const [loadStep, setLoadStep] = useState('starting…');

  // Handle /join route — public page, no auth needed
  if (window.location.pathname === '/join') return <JoinPage/>;

  useEffect(()=>{
    // Safety timeout — if anything hangs, unblock the loading screen after 6 s
    const safety = setTimeout(()=>{
      setLoadStep('timed out — forcing init');
      setInitialized(true);
    }, 6000);

    (async () => {
      try {
        setLoadStep('checking Supabase client…');
        if (!window.supabase) throw new Error('Supabase JS failed to load');
        setLoadStep('getting session…');
        const { data:{ session:s } } = await supabase.auth.getSession();
        setSession(s);
        setLoadStep(s ? `signed in as ${s.user.email}` : 'no session');
        if (s) {
          setLoadStep('checking admin access…');
          await determineAccess(s);
        }
      } catch (e) {
        console.error('Auth init error:', e);
        setLoadStep('error: ' + (e.message || e));
      } finally {
        clearTimeout(safety);
        setInitialized(true);
      }
    })();

    const {data:{subscription}} = supabase.auth.onAuthStateChange(async(_,s)=>{
      setSession(s);
      try {
        if(s) await determineAccess(s);
        else { setAccessLevel(null); setSelectedOrg(null); }
      } catch (e) {
        console.error('Auth state change error:', e);
        setAccessLevel('none');
      }
    });
    return ()=>{ clearTimeout(safety); subscription.unsubscribe(); };
  },[]);

  async function determineAccess(s) {
    try {
      const { data: isSuperData, error: e1 } = await supabase.rpc('is_super_admin');
      if (e1) console.error('is_super_admin error:', e1);
      if (isSuperData) { setAccessLevel('super'); return; }
      const { data: adminOrgs, error: e2 } = await supabase.rpc('get_my_admin_org_ids');
      if (e2) console.error('get_my_admin_org_ids error:', e2);
      if (adminOrgs && adminOrgs.length > 0) { setAccessLevel('org-admin'); return; }
      setAccessLevel('none');
    } catch (e) {
      console.error('determineAccess threw:', e);
      setAccessLevel('none');
    }
  }

  async function handleSignOut() {
    await supabase.auth.signOut();
    setAccessLevel(null); setSelectedOrg(null);
  }

  if (!initialized) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f1f5f9'}}>
      <div style={{textAlign:'center',maxWidth:360,padding:20}}>
        <div style={{fontSize:40,marginBottom:12}}>📦</div>
        <div style={{color:'#94a3b8',marginBottom:24}}>Loading… <span style={{fontSize:11,color:'#cbd5e1'}}>({loadStep})</span></div>
        <button className="btn btn-secondary btn-sm" onClick={()=>{
          try {
            Object.keys(localStorage).filter(k=>k.includes('supabase')).forEach(k=>localStorage.removeItem(k));
          } catch(e){}
          window.location.reload();
        }}>Stuck? Clear cache &amp; reload</button>
      </div>
    </div>
  );

  if (!session) return <LoginScreen onLogin={()=>{}}/>;
  if (accessLevel === 'none') return <NoAccessScreen email={session.user.email} onSignOut={handleSignOut}/>;
  if (!accessLevel) return <AccessChecker session={session} onAccess={setAccessLevel} onSignOut={handleSignOut}/>;

  const isSuperAdmin = accessLevel === 'super';

  if (selectedOrg) return (
    <div style={{display:'flex'}}>
      <nav className="sidebar">
        <div style={{padding:'20px 20px 16px',borderBottom:'1.5px solid #e2e8f0'}}>
          <div style={{fontWeight:800,fontSize:16,color:'#1e293b'}}>📦 RepTrack</div>
          <div style={{fontSize:11,color:'#94a3b8',marginTop:2,fontWeight:600}}>Admin Dashboard</div>
        </div>
        <div style={{flex:1,padding:'12px 8px'}}>
          <div className="nav-item active">🏢 Organizations</div>
          {isSuperAdmin && <div className="nav-item" onClick={()=>{setSelectedOrg(null);setView('stats');}}>📊 Platform Stats</div>}
        </div>
        <div style={{padding:'16px 20px',borderTop:'1.5px solid #e2e8f0'}}>
          <div style={{fontSize:12,color:'#64748b',marginBottom:8,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{session.user.email}</div>
          <button className="btn btn-secondary btn-sm" onClick={handleSignOut} style={{width:'100%',justifyContent:'center'}}>Sign Out</button>
        </div>
      </nav>
      <div className="main">
        <OrgDetail org={selectedOrg} isSuperAdmin={isSuperAdmin} session={session}
          onBack={()=>setSelectedOrg(null)}
          onOrgUpdated={org=>setSelectedOrg(org)}/>
      </div>
    </div>
  );

  return (
    <div style={{display:'flex'}}>
      <nav className="sidebar">
        <div style={{padding:'20px 20px 16px',borderBottom:'1.5px solid #e2e8f0'}}>
          <div style={{fontWeight:800,fontSize:16,color:'#1e293b'}}>📦 RepTrack</div>
          <div style={{fontSize:11,color:'#94a3b8',marginTop:2,fontWeight:600}}>Admin Dashboard</div>
        </div>
        <div style={{flex:1,padding:'12px 8px'}}>
          <div className={`nav-item${view==='orgs'?' active':''}`} onClick={()=>setView('orgs')}>🏢 Organizations</div>
          {isSuperAdmin && <div className={`nav-item${view==='stats'?' active':''}`} onClick={()=>setView('stats')}>📊 Platform Stats</div>}
        </div>
        <div style={{padding:'16px 20px',borderTop:'1.5px solid #e2e8f0'}}>
          <div style={{fontSize:12,color:'#64748b',marginBottom:8,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{session.user.email}</div>
          <button className="btn btn-secondary btn-sm" onClick={handleSignOut} style={{width:'100%',justifyContent:'center'}}>Sign Out</button>
        </div>
      </nav>
      <div className="main">
        {view==='orgs' && <OrgsView isSuperAdmin={isSuperAdmin} session={session} onSelectOrg={org=>{setSelectedOrg(org);}}/>}
        {view==='stats' && isSuperAdmin && <PlatformStats/>}
      </div>
    </div>
  );
}

// CSS animation
const style = document.createElement('style');
style.textContent = `@keyframes spin{to{transform:rotate(360deg)}}`;
document.head.appendChild(style);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
